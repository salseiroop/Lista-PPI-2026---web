<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Atividade 2 Flexbox</title>
    <style>
    
        body {
            background-color: lightgray;
            display: flex;
            justify-content: center;
        }
      
        .container {
            width: 300px;
            height: 500px;
            background-color: white;
            border: 2px solid purple;
            margin-top: 50px;
            padding: 20px;
            
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center; 
        }

        .box {
            background-color: #ddd;
            margin: 5px;
        }
      
        #topo-logo {
            background-color: transparent;
            font-family: sans-serif;
            color: gray;
        }

        #meio-linhas {
            width: 100%;
        }

        .linha {
            height: 15px;
            width: 100%;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        #perfil-circulo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
        }

        #perfil-nome {
            width: 100px;
            height: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="topo-logo">Company Logo</div>

        <div id="meio-linhas">
            <div class="box linha"></div>
            <div class="box linha"></div>
            <div class="box linha"></div>
            <div class="box linha"></div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="box" id="perfil-circulo"></div>
            <div class="box" id="perfil-nome"></div>
        </div>
    </div>

</body>
</html>
