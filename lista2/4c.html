    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin: 0px;padding: 0px;box-sizing: border-box;/*animation: rotacao 5s linear 0s infinite;*/}
        body{height: 100vh;}

        .box{border: 1px solid black;
            text-align: center;
            height: 25vh;
            width: 25vw;
            display: inline-block;
            font-size: 16px;
    }

        #box1{background-color: blue;position: fixed;
        top: 0px;
        left: 0px;
    }
        #box2{background-color: green;
        position: fixed;
        top: 0px;
        right: 0px;
    }
        #box3{background-color: red;
        position: fixed;
        bottom: 0px;
        left: 0px;
        }
        #box4{background-color: yellow;
        position: fixed;
        bottom: 0px;
        right: 0px;
        
        }
        #box5{
            background-color: deeppink;
            position: fixed;
            top: 38%;
            left: 38%;
           /* animação= transform: translate(-50%, 99%);*/
            
        }
       /* Fazer a animação: @keyframes rotacao{
            0%{}
            100%{transform: rotate(360deg);}
        }*/
    </style>
</head>
<body>
    <div id="box1" class="box">1</div>
    <div id="box2" class="box">2</div>
    <div id="box3" class="box">3</div>
    <div id="box4" class="box">4</div>
    <div id="box5" class="box">5</div>
    
</body>
</html>
