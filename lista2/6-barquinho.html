<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .cena {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #dcedfb 0%, #e0f6ff 60%, #ffffff 100%);
            overflow: hidden;
        }

        .nuvem {
            position: absolute;
            top: 15%;
            width: 150px;
            height: 50px;
            background-color: white;
            border-radius: 50px;
            box-shadow: 
                30px -25px 0 10px white, 
                80px -15px 0 5px white;
            opacity: 0.9;
            animation: moverNuvem 30s linear infinite;
        }

        .barco {
            position: absolute;
            bottom: 80px;
            width: 120px;
            height: 120px;
            background-image: url('img/barco.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            z-index: 10; 
            animation: 
                moverBarco 15s linear infinite, 
                balancarBarco 3s ease-in-out infinite alternate;
        }

        .mar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background-color: #3b82f6;
            z-index: 5;
        }

        .mar::before {
            content: "";
            position: absolute;
            top: -20px;
            left: 0;
            width: 200%;
            height: 20px;
            background-image: radial-gradient(circle at 20px 0px, transparent 20px, #3b82f6 21px);
            background-size: 40px 20px;
            animation: moverOndas 4s linear infinite;
        }

        @keyframes moverNuvem {
            0% { left: -250px; }
            100% { left: 100vw; }
        }

        @keyframes moverBarco {
            0% { left: -150px; }
            100% { left: 100vw; }
        }

        @keyframes balancarBarco {
            0% { transform: rotate(-5deg) translateY(0); }
            100% { transform: rotate(5deg) translateY(10px); }
        }

        @keyframes moverOndas {
            0% { transform: translateX(0); }
            100% { transform: translateX(-40px); }
        }
    </style>
</head>
<body>

    <div class="cena">
        <div class="nuvem"></div>
        <div class="barco"></div>
        <div class="mar"></div>
    </div>

</body>
</html>
