<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title> 
    <style>
        #box-div-4{ position: relative; left:50px;top:-30px }
        .container{display: flex;
            height: 100vh;
            flex-direction: row;
            justify-content: space-around;
            align-items: center; 
        }
        .box{background-color:gray;
            border: 1px solid orange;
        }
        .box:hover{flex-grow: 5;
                transition: all 3s;
        }


    </style>
</head>
<body>
    <div class="container">
        <div class="box" id="box-1">1</div>
        <div class="box" id="box-2">2</div>
        <div class="box" id="box-3">3</div>
        <div class="box" id="box-4">4</div>
        <div class="box" id="box-5">5</div>
    </div>

    <div class="container">
        <span class="box" id="box-span-1">1</span>
        <span class="box" id="box-span-2">2</span>
        <span class="box" id="box-span-3">3</span>
        <span class="box" id="box-span-4">4</span>
        <span class="box" id="box-span-5">5</span>
    </div>
</body>
</html>
